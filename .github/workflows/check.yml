name: CI Check on PR

on:
  pull_request:
    branches: [ "develop", "main" ] # dev나 main으로 향하는 모든 PR에서 작동

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17 (본인 버전에 맞게 수정)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build with Gradle
        # 테스트 코드가 돌고 빌드가 되는지 확인
        run: ./gradlew clean build -x test
        
      # 만약 도커 이미지까지 미리 검증하고 싶다면 여기 아래에 빌드 단계 추가
      # - name: Build Docker Image
      #   run: docker build -t akiba-backend:test .